<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>عضوية VIP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #0b0e14;
  --card: #12161f;
  --card-border: #262c3a;
  --text: #edeff3;
  --text-dim: #8b93a7;
  --gold: #c9a227;
  --gold-soft: rgba(201, 162, 39, 0.15);
  --green: #3ddc84;
  --red: #e5484d;
}
* { box-sizing: border-box; }
body {
  margin: 0; min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(circle at 50% 0%, #161c28 0%, var(--bg) 60%);
  font-family: 'Inter', sans-serif; color: var(--text); padding: 24px;
}
.card {
  position: relative; width: 100%; max-width: 380px;
  background: var(--card); border: 1px solid var(--card-border);
  border-radius: 14px; padding: 40px 32px 32px;
}
.card::before, .card::after {
  content: ''; position: absolute; width: 22px; height: 22px; border: 2px solid var(--gold);
}
.card::before { top: -1px; left: -1px; border-right: none; border-bottom: none; border-radius: 14px 0 0 0; }
.card::after { bottom: -1px; right: -1px; border-left: none; border-top: none; border-radius: 0 0 14px 0; }
.eyebrow { font-size: 12px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; text-align: center; margin-bottom: 6px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 600; text-align: center; margin: 0 0 28px; letter-spacing: 0.5px; }
label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
input {
  width: 100%; padding: 12px 14px; margin-bottom: 18px;
  background: #0f131b; border: 1px solid var(--card-border); border-radius: 8px;
  color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
  transition: border-color 0.15s ease;
}
input:focus { border-color: var(--gold); }
input::placeholder { color: #4d5568; }
button {
  width: 100%; padding: 13px; border: none; border-radius: 8px;
  background: var(--gold); color: #14150f; font-weight: 600; font-size: 14px;
  letter-spacing: 0.3px; cursor: pointer; transition: filter 0.15s ease;
}
button:hover { filter: brightness(1.08); }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.msg { font-size: 13px; text-align: center; border-radius: 8px; padding: 10px 12px; margin-bottom: 18px; display: none; }
.msg.error { background: rgba(229, 72, 77, 0.12); color: var(--red); display: block; }
.status-icon { width: 56px; height: 56px; margin: 0 auto 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; }
.status-icon.pending { background: var(--gold-soft); color: var(--gold); }
.status-icon.approved { background: rgba(61, 220, 132, 0.12); color: var(--green); }
.status-icon.rejected { background: rgba(229, 72, 77, 0.12); color: var(--red); }
.req-number { text-align: center; font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold); letter-spacing: 1px; margin-bottom: 4px; }
.center-text { text-align: center; color: var(--text-dim); font-size: 13px; line-height: 1.6; }
.official-notice {
  border-top: 1px solid var(--card-border);
  border-bottom: 1px solid var(--card-border);
  padding: 16px 0; margin: 16px 0;
}
.official-notice p { margin: 0; text-align: center; color: var(--text); font-size: 14px; line-height: 1.8; }
.view { display: none; }
.view.active { display: block; }
</style>
</head>
<body>

  <!-- الشاشة الرئيسية: بريد + كلمة سر فقط -->
  <div class="card view active" id="view-access">
    <div class="eyebrow">Members Only</div>
    <h1>الدخول إلى العضوية</h1>
    <div id="accessMsg" class="msg"></div>
    <form id="accessForm">
      <label for="accEmail">البريد الإلكتروني</label>
      <input type="email" id="accEmail" placeholder="example@mail.com" required />
      <label for="accPassword">كلمة السر (بالإنجليزي)</label>
      <input type="password" id="accPassword" placeholder="••••••••" required />
      <button type="submit" id="accessBtn">متابعة</button>
    </form>
  </div>

  <!-- بانتظار الموافقة -->
  <div class="card view" id="view-pending">
    <div class="status-icon pending">⏳</div>
    <h1 style="margin-bottom:6px;">طلبك قيد الانتظار</h1>
    <div class="req-number" id="reqNumber"></div>
    <p class="center-text">تم استلام طلبك وهو قيد المراجعة حالياً.<br />ما في داعي تسجل من جديد — رجع افتح الصفحة لاحقاً وأدخل نفس البيانات لمعرفة النتيجة.</p>
  </div>

  <!-- رفض رسمي -->
  <div class="card view" id="view-rejected">
    <div class="status-icon rejected">✕</div>
    <h1 style="margin-bottom:6px;">نتيجة الطلب</h1>
    <div class="official-notice">
      <p id="rejectionText"></p>
    </div>
    <p class="center-text">شكراً لاهتمامك بالانضمام إلينا.</p>
  </div>

  <!-- لوحة العضو -->
  <div class="card view" id="view-dashboard">
    <div class="status-icon approved">✓</div>
    <h1 style="margin-bottom:6px;">أهلاً فيك</h1>
    <p class="center-text" id="welcomeText">جاري التحميل...</p>
    <br />
    <button onclick="logout()">تسجيل الخروج</button>
  </div>

<script>
function showView(name) {
  document.querySelectorAll('.view').forEach((v) => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
}

document.getElementById('accessForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('accessMsg');
  const btn = document.getElementById('accessBtn');
  msg.className = 'msg'; msg.textContent = '';
  btn.disabled = true; btn.textContent = 'جاري المعالجة...';

  const email = document.getElementById('accEmail').value.trim();
  const password = document.getElementById('accPassword').value;

  try {
    const res = await fetch('/api/access', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();

    if (!res.ok && !data.status) {
      msg.className = 'msg error'; msg.textContent = data.error || 'صار في خطأ';
      return;
    }

    if (data.status === 'pending') {
      document.getElementById('reqNumber').textContent = data.requestNumber || '';
      showView('pending');
    } else if (data.status === 'rejected') {
      document.getElementById('rejectionText').textContent = data.message;
      showView('rejected');
    } else if (data.status === 'approved') {
      localStorage.setItem('token', data.token);
      loadDashboard();
    }
  } catch {
    msg.className = 'msg error'; msg.textContent = 'ما قدرنا نوصل للسيرفر';
  } finally {
    btn.disabled = false; btn.textContent = 'متابعة';
  }
});

function logout() {
  localStorage.removeItem('token');
  showView('access');
}

async function loadDashboard() {
  const token = localStorage.getItem('token');
  if (!token) { showView('access'); return; }

  try {
    const res = await fetch('/api/me', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error();
    const data = await res.json();
    document.getElementById('welcomeText').textContent = `أنت عضو VIP معتمد — ${data.email}`;
    showView('dashboard');
  } catch {
    localStorage.removeItem('token');
    showView('access');
  }
}

// إذا في توكن محفوظ من قبل، جرب افتح اللوحة مباشرة
loadDashboard();
</script>
</body>
</html>
